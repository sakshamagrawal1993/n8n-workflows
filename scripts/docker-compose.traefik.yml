# Overlay: TLS + WSS via Traefik (same host as n8n).
#
# 1) DNS: A record e.g. yfinance.saksham-experiments.com -> VPS IP
# 2) On VPS: find Traefik container name: docker ps | grep -i traefik
#    Then shared Docker network (same as n8n usually):
#      docker inspect "$(docker ps -qf name=n8n)" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'
# 3) Set env in shell or a .env next to this file:
#      TRAEFIK_PUBLIC_NETWORK=root_default       # network from step 2 (often root_default)
#      YFINANCE_WS_HOST=yfinance.saksham-experiments.com
#      TRAEFIK_CERT_RESOLVER=letsencrypt       # from n8n labels (see steps doc)
#      TRAEFIK_ENTRYPOINT=websecure            # if Traefik errors, try: https
# 4) Deploy:
#      docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d --build
#
# Frontend (Vercel): VITE_TRADING_AGENTS_VPS_WS_URL=wss://yfinance.saksham-experiments.com/ws

services:
  yfinance-research:
    networks:
      - default
      - traefik_public
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-root_default}
      - traefik.http.routers.yfinance.rule=Host(`${YFINANCE_WS_HOST}`)
      - traefik.http.routers.yfinance.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.yfinance.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.services.yfinance.loadbalancer.server.port=8001

networks:
  traefik_public:
    external: true
    name: ${TRAEFIK_PUBLIC_NETWORK:-root_default}
